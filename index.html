<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6B6661">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>권씨네 일정관리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #F5F3F0;
    color: #2F2D2A;
    padding-bottom: 40px;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 16px; }

  header { text-align: center; padding: 12px 0 4px; position: relative; }
  header h1 { font-size: 22px; }
  header .today { font-size: 13px; color: #8B8680; margin-top: 4px; }
  #syncStatus {
    display: inline-block; margin-top: 6px; font-size: 11px;
    background: #ECEAE6; color: #6B6661; padding: 3px 10px; border-radius: 999px;
  }
  #syncStatus.on { background: #E4E1DC; color: #4A4741; }

  .tabs { display: flex; gap: 8px; margin-top: 20px; }
  .tab {
    flex: 1; padding: 12px 0; border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
    background: #ECEAE6; color: #8B8680; cursor: pointer;
  }
  .tab.active { background: #3B3835; color: #fff; }

  section.card {
    background: #fff; border-radius: 18px; padding: 16px; margin-top: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .card h2 { font-size: 16px; display: flex; align-items: center; justify-content: space-between; }
  .icon {
    width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
  }
  .h2t { display: inline-flex; align-items: center; gap: 7px; }
  header h1 .icon { width: 20px; height: 20px; vertical-align: -3px; }
  #syncStatus::before { content: "●"; margin-right: 5px; font-size: 9px; vertical-align: 1px; }
  .card h2 .edit-btn {
    font-size: 12px; font-weight: 600; border: 1px solid #D3CFC8; background: #fff;
    color: #8B8680; border-radius: 999px; padding: 4px 12px; cursor: pointer;
  }
  .card h2 .edit-btn.editing { background: #2F2D2A; color: #fff; border-color: #2F2D2A; }

  .date-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 12px 0 4px; }
  .date-nav button {
    border: none; background: #ECEAE6; border-radius: 8px; width: 26px; height: 26px;
    font-size: 11px; cursor: pointer; color: #6B6661;
  }
  .date-nav .cur { font-size: 15px; font-weight: 700; min-width: 140px; text-align: center; }
  .date-nav .today-btn { width: auto; padding: 0 10px; font-size: 12px; }

  .progress-outer { background: #ECEAE6; border-radius: 999px; height: 10px; margin: 10px 0 4px; overflow: hidden; }
  .progress-inner { height: 100%; border-radius: 999px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: #8B8680; text-align: right; }

  ul.checklist { list-style: none; margin-top: 10px; }
  ul.checklist li {
    display: flex; align-items: center; gap: 10px; padding: 11px 6px;
    border-bottom: 1px dashed #EAE7E2; font-size: 15px;
  }
  ul.checklist li:last-child { border-bottom: none; }
  ul.checklist input[type=checkbox] { width: 22px; height: 22px; accent-color: currentColor; flex-shrink: 0; }
  ul.checklist .txt {
    flex: 1; min-width: 0; border: none; background: transparent;
    font-size: 15px; outline: none; padding: 2px 0; font-family: inherit; color: inherit;
  }
  ul.checklist li.done .txt { text-decoration: line-through; color: #B2ADA6; }
  ul.checklist .del {
    margin-left: auto; border: none; background: #FDE8E8; color: #D64545;
    border-radius: 8px; width: 26px; height: 26px; font-size: 14px; cursor: pointer;
  }
  #grapeArea { margin-top: 14px; border-top: 1px dashed #EAE7E2; padding-top: 12px; }
  .grape-btn {
    display: block; width: 100%; border: none; border-radius: 12px; padding: 12px;
    background: #7C5296; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .grape-done { text-align: center; font-size: 14px; color: #7C5296; font-weight: 700; padding: 4px 0; }
  .grape-count { font-size: 12px; color: #8B8680; margin-bottom: 6px; }
  .grape-board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .grape-board .grape { width: 100%; aspect-ratio: 1; border-radius: 50%; background: #EFECE7; border: 1px solid #E2DED7; }
  .grape-board .grape.on { background: none; border: none; }
  .grape-board .grape img { display: block; width: 100%; height: 100%; object-fit: contain; }

  .add-row { display: flex; gap: 8px; margin-top: 12px; }
  .add-row input {
    flex: 1; min-width: 0; border: 1.5px solid #DBD7D1; border-radius: 10px; padding: 10px 12px; font-size: 14px;
    background: #FCFBFA;
  }
  .add-row button {
    border: none; border-radius: 10px; padding: 0 16px; font-size: 14px; font-weight: 700;
    background: #2F2D2A; color: #fff; cursor: pointer; white-space: nowrap;
  }
  .add-row select {
    border: 1.5px solid #DBD7D1; border-radius: 10px; padding: 10px 6px; font-size: 13px;
    background: #FCFBFA; font-family: inherit; color: inherit;
  }

  .sched-hint { font-size: 11px; color: #B2ADA6; text-align: center; margin-top: 10px; }

  .sched-wrap { display: flex; gap: 12px; margin-top: 12px; align-items: flex-start; }
  #schedList { list-style: none; flex: 3; min-width: 0; border: 1px solid #B8B4AC; border-radius: 6px; overflow: hidden; }
  #schedList li {
    display: flex; align-items: stretch; gap: 8px; padding: 0 6px 0 0;
    border-bottom: 1px solid #B8B4AC; min-height: 38px;
  }
  #schedList li:last-child { border-bottom: none; }
  #schedList li:focus-within { background: #FCF7EA; }
  #schedList li.head {
    min-height: 30px; background: #F1EEE9; font-size: 11px; color: #8B8680; font-weight: 700;
  }
  #schedList li.head .s-label { flex: 1; align-self: center; padding: 0 2px; text-align: center; }
  #schedList li.head .s-time { justify-content: center; text-align: center; }
  .vt-head {
    height: 30px; background: #F1EEE9; border: 1px solid #B8B4AC; border-bottom: none;
    border-radius: 6px 6px 0 0; font-size: 11px; color: #8B8680; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  #schedList .s-time {
    flex: 0 0 90px; border-right: 1px solid #B8B4AC; padding: 0; position: relative;
    display: flex; flex-direction: column; justify-content: center; text-align: center;
    font-size: 10px; font-weight: 700; color: #4A7DB5; line-height: 1.4;
  }
  #schedList .s-time input {
    width: 100%; min-width: 0; flex: 1; border: none; background: transparent; font-family: inherit;
    font-size: 10px; font-weight: 700; color: #4A7DB5; text-align: center; outline: none; padding: 0;
  }
  #schedList .s-time input::placeholder { color: #C8C4BD; font-weight: 400; font-size: 9px; }
  #schedList .s-time input + input { border-top: 1px dashed #E2DED7; }
  #schedList input.s-text {
    flex: 1; min-width: 0; border: none; background: transparent;
    font-size: 13px; padding: 8px 2px; outline: none; align-self: center;
  }
  #schedList .del {
    border: none; background: #FDE8E8; color: #D64545; border-radius: 6px;
    width: 20px; height: 20px; font-size: 11px; cursor: pointer; flex-shrink: 0; align-self: center;
  }
  #schedTimeline { flex: 0 0 75px; }
  .vt { position: relative; border: 1px solid #B8B4AC; border-radius: 6px; overflow: hidden; }
  .vt-line { position: absolute; left: 0; right: 0; border-top: 1px solid #B8B4AC; }
  .vt-divider { position: absolute; top: 0; bottom: 0; left: 22px; border-left: 1px solid #B8B4AC; }
  .vt-label {
    position: absolute; left: 0; width: 22px; transform: translateY(-50%);
    font-size: 9px; color: #6B6661; text-align: center;
  }
  .vt-bar {
    position: absolute; left: 25px; right: 3px; border-radius: 3px;
    font-size: 8px; font-weight: 700; padding: 1px 3px; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis; line-height: 1.2;
  }

  .cal-legend { display: flex; gap: 14px; font-size: 12px; color: #6B6661; margin-top: 8px; }
  .cal-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; background: #3B3835; }
  .cal-month { margin-top: 14px; }
  .cal-month h3 { font-size: 14px; text-align: center; margin-bottom: 8px; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
    grid-template-rows: auto; grid-auto-rows: 74px; /* 요일 줄만 자동, 날짜 줄은 높이 고정 */
  }
  .cal-grid .dow { text-align: center; font-size: 11px; color: #B2ADA6; padding: 3px 0; }
  .cal-grid .dow.sun { color: #C96B6B; }
  .cal-cell {
    position: relative; text-align: center; padding: 3px 1px 8px; border-radius: 8px;
    font-size: 12px; cursor: pointer; overflow: hidden;
    border: 1px solid #F0EEEA; background: #FDFCFB;
  }
  .cal-cell.dim { background: transparent; border-color: transparent; }
  .cal-cell.dim .num, .cal-cell.dim.sun .num { color: #CFCAC2; }
  .cal-cell.dim .cal-evt, .cal-cell.dim .cal-bars { opacity: 0.45; }
  .cal-cell.sun .num { color: #C96B6B; }
  .cal-cell .num { display: inline-block; margin-bottom: 2px; }
  .cal-cell.today .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%; background: #6B6661; color: #fff; font-weight: 800;
  }
  .cal-cell.selected { background: #EFEBE4; box-shadow: inset 0 0 0 2px #6B6661; }
  .cal-evt {
    font-size: 8.5px; border-radius: 4px;
    padding: 1px 3px; margin: 1px 2px 0; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cal-more { font-size: 9px; color: #8B8680; text-align: left; margin-left: 3px; }
  .cal-bars { position: absolute; left: 8%; right: 8%; bottom: 2px; display: flex; flex-direction: column; gap: 2px; }
  .cal-bars .bar { height: 3px; border-radius: 2px; background: #3B3835; }
  .memo-title { font-size: 13px; font-weight: 700; margin-top: 16px; }

  #phoneList { list-style: none; margin-top: 4px; }
  #phoneList li {
    display: flex; align-items: center; gap: 10px; padding: 10px 4px;
    border-bottom: 1px dashed #EAE7E2;
  }
  #phoneList li:last-child { border-bottom: none; }
  #phoneList .p-name { flex: 1; min-width: 0; font-size: 14px; font-weight: 600; }
  #phoneList .p-num { font-size: 12px; color: #8B8680; white-space: nowrap; }
  #phoneList .call-btn {
    text-decoration: none; background: #3D7A55; color: #fff; border-radius: 10px;
    padding: 8px 13px; font-size: 13px; font-weight: 700; white-space: nowrap;
  }
  #phoneList .del {
    border: none; background: #FDE8E8; color: #D64545; border-radius: 6px;
    width: 20px; height: 20px; font-size: 11px; cursor: pointer; flex-shrink: 0;
  }
  #phoneList .empty { color: #BDB8B1; font-size: 13px; text-align: center; padding: 10px 0; }

  .evt-empty { text-align: center; color: #BDB8B1; font-size: 13px; padding: 14px 0 4px; }
  ul.evt-list { list-style: none; margin-top: 6px; }
  ul.evt-list li {
    display: flex; align-items: center; gap: 10px; padding: 10px 6px;
    border-bottom: 1px dashed #EAE7E2; font-size: 15px;
  }
  ul.evt-list li:last-child { border-bottom: none; }
  ul.evt-list .evt-time { font-weight: 700; min-width: 52px; font-size: 14px; }
  ul.evt-list .del {
    margin-left: auto; border: none; background: #FDE8E8; color: #D64545;
    border-radius: 8px; width: 26px; height: 26px; font-size: 14px; cursor: pointer;
  }
  footer { text-align: center; font-size: 11px; color: #BDB8B1; margin-top: 24px; }

  #lockScreen {
    position: fixed; inset: 0; z-index: 100; background: #F5F3F0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    padding: 24px;
  }
  #lockScreen .emoji { font-size: 52px; }
  #lockScreen p { font-size: 15px; color: #6B6661; }
  #pinInput {
    font-size: 26px; text-align: center; letter-spacing: 10px; width: 190px;
    border: 2px solid #DBD7D1; border-radius: 14px; padding: 12px; background: #fff;
  }
  #pinBtn {
    border: none; background: #6B6661; color: #fff; font-size: 16px; font-weight: 700;
    border-radius: 14px; padding: 12px 40px; cursor: pointer;
  }
  #pinError { color: #D64545; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
<div id="lockScreen">
  <div class="emoji"><svg class="icon" style="width:52px;height:52px;stroke-width:1.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
  <p>가족 비밀번호를 입력해 주세요</p>
  <input id="pinInput" type="password" inputmode="numeric" maxlength="6" autocomplete="off">
  <div id="pinError"></div>
  <button id="pinBtn">확인</button>
</div>
<div class="wrap">
  <header>
    <h1><svg class="icon" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> 권씨네 일정관리</h1>
    <div class="today" id="todayLabel"></div>
    <span id="syncStatus">이 기기에만 저장 중</span>
  </header>

  <div class="tabs">
    <button class="tab" data-kid="junwoo">준우</button>
    <button class="tab" data-kid="yujin">유진</button>
    <button class="tab" data-kid="appa">아빠</button>
    <button class="tab" data-kid="eomma">엄마</button>
  </div>

  <section class="card" id="grapeCard">
    <h2><span class="h2t"><svg class="icon" viewBox="0 0 24 24"><path d="M22 5V2l-5.89 5.89"/><circle cx="16.6" cy="15.89" r="3"/><circle cx="8.11" cy="7.4" r="3"/><circle cx="12.35" cy="11.65" r="3"/><circle cx="13.91" cy="5.85" r="3"/><circle cx="18.15" cy="10.09" r="3"/><circle cx="6.56" cy="13.2" r="3"/><circle cx="10.8" cy="17.44" r="3"/><circle cx="5" cy="19" r="3"/></svg>포도알 받기</span> <button class="edit-btn" id="editItemsBtn">항목 편집</button></h2>
    <div class="date-nav">
      <button id="prevDay">◀</button>
      <span class="cur" id="curDate"></span>
      <button id="nextDay">▶</button>

  <section class="card">
    <h2><span class="h2t"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>To-do list</span> <button class="edit-btn" id="editSchedBtn">항목 편집</button></h2>

    <div class="sched-wrap">
      <ul id="schedList"></ul>
      <div id="schedTimeline"></div>

    <div class="sched-hint">시간은 숫자로 입력하세요 · 예) 930 → 09:30, 1830 → 18:30</div>
  </section>

  <section class="card" id="commentCard">
    <h2><span class="h2t"><svg class="icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Comment</span></h2>
    <div id="commentList"></div>
    <div class="add-row">
      <select id="commentWho">
        <option>엄마</option><option>아빠</option><option>준우</option><option>유진</option>
      </select>
      <input id="commentText" placeholder="한마디 남기기" maxlength="60">
      <button id="commentAdd">추가</button>
    </div>
  </section>

  <section class="card">
    <h2><span class="h2t"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>달력</span></h2>

<script type="module">
/* ===== 잠금 화면 ===== */
const PIN_HASH = "b5076a1fecbea736a5f27ff97e0b5d777c94d0b5cf2bad72291d63657fc6355f";
async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
async function tryUnlock() {
  const input = document.getElementById("pinInput");
  if (await sha256(input.value.trim()) === PIN_HASH) {
    localStorage.setItem("banghak-unlock", "1");
    document.getElementById("lockScreen").remove();
  } else {
    document.getElementById("pinError").textContent = "비밀번호가 맞지 않아요";
    input.value = "";
  }
}
if (localStorage.getItem("banghak-unlock") === "1") {
  document.getElementById("lockScreen").remove();
} else {
  document.getElementById("pinBtn").addEventListener("click", tryUnlock);
  document.getElementById("pinInput").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
}

/* ===== 기본 정보 ===== */

  junwoo: { name: "준우", full: "준우", grade: "중1", color: "#3B3835",
            vacStart: "2026-07-21", schoolStart: "2026-08-14" },
  yujin:  { name: "유진", full: "유진", grade: "초5", color: "#3B3835",
            vacStart: "2026-07-23", schoolStart: "2026-08-26" },
  appa:   { name: "아빠", full: "아빠", color: "#3B3835" },
  eomma:  { name: "엄마", full: "엄마", color: "#3B3835" },
};
const MEMBER_KEYS = Object.keys(KIDS);
const DEFAULT_DATA = {
  junwoo: {
    items: [
      { id: "j1", text: "수학 문제집 풀기" },
      { id: "j2", text: "영어 단어 외우기" },
      { id: "j3", text: "독서 30분" },
      { id: "j4", text: "운동 30분" },
      { id: "j5", text: "방 정리하기" },
    ],
    schedule: {},
    checks: {},
  },
  yujin: {
    items: [
      { id: "y1", text: "방학 숙제 하기" },
      { id: "y2", text: "독서 30분" },
      { id: "y3", text: "일기 쓰기" },
      { id: "y4", text: "줄넘기 / 운동" },
      { id: "y5", text: "방 정리하기" },
    ],
    schedule: {},

let data = null;
let currentKid = "junwoo";
let selectedDate = todayStr();
let editingItems = false;
let editingSched = false;
let editingPhone = false;
let calCursor = { y: new Date().getFullYear(), m: new Date().getMonth() + 1 };

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function parseDate(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function fmtDate(s) {
  const d = parseDate(s);
  const dow = ["일","월","화","수","목","금","토"][d.getDay()];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${dow})`;
}
function shiftDate(s, n) {
  const d = parseDate(s); d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

/* ===== 저장소 (Firebase 또는 localStorage) ===== */
const FAMILY_PATH = "families/kwon-2026-summer";
let store = null;

async function initStore() {
  if (window.FIREBASE_CONFIG) {
    try {
      const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const dbMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
      const app = appMod.initializeApp(window.FIREBASE_CONFIG);
      const db = dbMod.getDatabase(app);
      const rootRef = dbMod.ref(db, FAMILY_PATH);
      store = {
        write(path, value) { dbMod.set(dbMod.ref(db, `${FAMILY_PATH}/${path}`), value); },
      };
      dbMod.onValue(rootRef, (snap) => {
        const v = snap.val();
        if (!v) {
          dbMod.set(rootRef, DEFAULT_DATA);
          return;
        }
        // 예전 형식(날짜 없는 계획표/항목)이 남아 있으면 오늘 날짜 아래로 한 번 옮겨 저장
        for (const kid of MEMBER_KEYS) {
          if (v[kid] && Array.isArray(v[kid].schedule)) {
            dbMod.set(dbMod.ref(db, `${FAMILY_PATH}/${kid}/schedule`), { [todayStr()]: v[kid].schedule });
            return; // 변환된 데이터가 다시 수신됨
          }
          if (v[kid] && Array.isArray(v[kid].items)) {
            // 사용 시작 전 날짜를 기준으로 저장해 과거 날짜들이 기존 내용을 그대로 유지
            dbMod.set(dbMod.ref(db, `${FAMILY_PATH}/${kid}/items`), { "2026-01-01": v[kid].items });
            return;
          }
        }
        // 예전 공용 전화번호부가 남아 있으면 모든 가족의 개인 전화번호부로 복사
        if (v.phonebook) {
          const shared = Array.isArray(v.phonebook) ? v.phonebook : Object.values(v.phonebook);
          const updates = { phonebook: null };
          for (const kid of MEMBER_KEYS) {
            const own = v[kid] && v[kid].phonebook
              ? (Array.isArray(v[kid].phonebook) ? v[kid].phonebook : Object.values(v[kid].phonebook)) : [];
            updates[`${kid}/phonebook`] = [...own, ...shared];
          }
          dbMod.update(rootRef, updates);
          return;
        }
        data = normalize(v);
        render();
      });
      const st = document.getElementById("syncStatus");
      st.textContent = "실시간 공유 중";
      st.classList.add("on");
      return;
    } catch (e) {
      console.error("Firebase 연결 실패, 로컬 저장으로 전환:", e);
    }
  }
  // localStorage 모드
  const saved = localStorage.getItem("vacation2026");
  data = saved ? normalize(JSON.parse(saved)) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  store = {
    write(path, value) {
      // path 예: "junwoo/checks/2026-07-21/j1"
      const keys = path.split("/");
      let obj = data;
      for (let i = 0; i < keys.length - 1; i++) {
        if (obj[keys[i]] == null) obj[keys[i]] = {};
        obj = obj[keys[i]];
      }
      if (value === null) delete obj[keys[keys.length-1]];
      else obj[keys[keys.length-1]] = value;
      localStorage.setItem("vacation2026", JSON.stringify(data));
      render();
    },
  };
  render();
}

// Firebase는 빈 객체/배열을 지우기 때문에 형태 보정
function normalize(v) {
  for (const kid of MEMBER_KEYS) {
    if (!v[kid]) v[kid] = JSON.parse(JSON.stringify(DEFAULT_DATA[kid]));
    if (!v[kid].items) v[kid].items = {};
    // 예전 형식(날짜 없는 항목 목록)은 사용 시작 전 날짜 기준으로 옮김
    if (Array.isArray(v[kid].items)) {
      v[kid].items = v[kid].items.length ? { "2026-01-01": v[kid].items } : {};
    }
    for (const d of Object.keys(v[kid].items)) {
      if (!Array.isArray(v[kid].items[d])) v[kid].items[d] = Object.values(v[kid].items[d]);
    }
    if (!v[kid].schedule) v[kid].schedule = {};
    if (!v[kid].checks) v[kid].checks = {};
    if (!v[kid].events) v[kid].events = {};
    if (!v[kid].grapes) v[kid].grapes = {};
    if (!v[kid].phonebook) v[kid].phonebook = [];
    if (!Array.isArray(v[kid].phonebook)) v[kid].phonebook = Object.values(v[kid].phonebook);
    if (!v[kid].comments) v[kid].comments = {};
    for (const d of Object.keys(v[kid].comments)) {
      if (!Array.isArray(v[kid].comments[d])) v[kid].comments[d] = Object.values(v[kid].comments[d]);
    }
    // 예전 형식(날짜 없는 배열)은 오늘 날짜의 계획으로 옮김
    if (Array.isArray(v[kid].schedule)) {
      v[kid].schedule = v[kid].schedule.length ? { [todayStr()]: v[kid].schedule } : {};
    }
    for (const d of Object.keys(v[kid].schedule)) {
      if (!Array.isArray(v[kid].schedule[d])) v[kid].schedule[d] = Object.values(v[kid].schedule[d]);
    }
    for (const d of Object.keys(v[kid].events)) {
      if (!Array.isArray(v[kid].events[d])) v[kid].events[d] = Object.values(v[kid].events[d]);
    }
  }
  // 예전 공용 전화번호부가 있으면 각자에게 복사 (로컬 저장 모드용)
  if (v.phonebook) {
    const shared = Array.isArray(v.phonebook) ? v.phonebook : Object.values(v.phonebook);
    for (const kid of MEMBER_KEYS) v[kid].phonebook.push(...shared);
    delete v.phonebook;
  }
  return v;
}

let commentTabFor = null;
function renderComments() {
  const box = document.getElementById("commentList");
  const arr = (data[currentKid].comments || {})[selectedDate] || [];
  let html = `<div class="memo-title" style="margin-top:4px">${fmtDate(selectedDate)} 한마디</div>`;
  if (arr.length) {
    html += `<ul class="evt-list">` + arr.map((c, i) => {
      const col = evtColor(c.who || "");
      return `<li>
        <span style="background:${col.bg}; color:${col.fg}; border-radius:6px; padding:2px 8px; font-size:12px; font-weight:700; white-space:nowrap">${escapeHtml(c.who || "")}</span>
        <span style="font-size:14px">${escapeHtml(c.text)}</span>
        <button class="del" data-i="${i}">✕</button></li>`;
    }).join("") + `</ul>`;
  } else {
    html += `<div class="evt-empty">${KIDS[currentKid].name} 일정에 응원이나 부탁을 남겨보세요</div>`;
  }
  box.innerHTML = html;
  box.querySelectorAll(".del").forEach(btn => {
    btn.addEventListener("click", () => {
      const next = arr.filter((_, i) => i !== Number(btn.dataset.i));
      store.write(`${currentKid}/comments/${selectedDate}`, next.length ? next : null);
    });
  });
  // 탭이 바뀌면 작성자 기본값을 상대방으로
  if (commentTabFor !== currentKid) {
    commentTabFor = currentKid;
    document.getElementById("commentWho").value = currentKid === "appa" ? "엄마" : "아빠";
  }
}

function renderTabs() {
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.kid === currentKid);
  });
}

function renderChecklist() {
  const kid = data[currentKid];
  const checks = (kid.checks && kid.checks[selectedDate]) || {};
  document.getElementById("curDate").textContent = fmtDate(selectedDate);

  const ul = document.getElementById("checklist");
  ul.innerHTML = "";
  ul.style.color = KIDS[currentKid].color;
  const dayItems = itemsOf(kid, selectedDate);
  let done = 0;
  dayItems.forEach((item, idx) => {
    const checked = !!checks[item.id];
    if (checked) done++;
    const li = document.createElement("li");
    li.className = checked ? "done" : "";
    li.innerHTML = `
      <input type="checkbox" ${checked ? "checked" : ""}>
      <input class="txt" maxlength="30" value="${escapeHtml(item.text)}">
      ${editingItems ? `<button class="del">✕</button>` : ""}`;
    li.querySelector("input[type=checkbox]").addEventListener("change", (e) => {
      store.write(`${currentKid}/checks/${selectedDate}/${item.id}`, e.target.checked ? true : null);
    });
    const txt = li.querySelector(".txt");
    txt.addEventListener("keydown", e => { if (e.key === "Enter") txt.blur(); });
    txt.addEventListener("change", () => {
      const newText = txt.value.trim();
      const items = newText
        ? dayItems.map((it, i) => i === idx ? { ...it, text: newText } : it)
        : dayItems.filter((_, i) => i !== idx); // 비우면 삭제
      store.write(`${currentKid}/items/${selectedDate}`, items);
    });
    if (editingItems) {
      li.querySelector(".del").addEventListener("click", () => {
        const items = dayItems.filter((_, i) => i !== idx);
        store.write(`${currentKid}/items/${selectedDate}`, items);
      });
    }
    ul.appendChild(li);
  });

  const total = dayItems.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const bar = document.getElementById("progressBar");
  bar.style.width = pct + "%";
  bar.style.background = KIDS[currentKid].color;
  document.getElementById("progressLabel").textContent =
    total ? `${done} / ${total} 완료 (${pct}%)` : "항목을 추가해 주세요";

  document.getElementById("itemAddRow").style.display = editingItems ? "flex" : "none";
  const btn = document.getElementById("editItemsBtn");
  btn.textContent = editingItems ? "완료" : "항목 편집";
  btn.classList.toggle("editing", editingItems);
  renderGrapes(done, total);
}

function grapeVariant(dateStr) {
  let h = 0;
  for (let i = 0; i < dateStr.length; i++) h = (h * 31 + dateStr.charCodeAt(i)) % 9973;
  return h % GRAPE_IMGS.length;
}

function renderGrapes(done, total) {
  const area = document.getElementById("grapeArea");
  const grapes = data[currentKid].grapes || {};
  const count = Object.keys(grapes).length;
  let html = "";

  if (total > 0 && done === total) {
    if (grapes[selectedDate]) {
      const v = grapeVariant(selectedDate);
      html += `<div class="grape-done">${fmtDate(selectedDate)} ${v === 4 ? "포도쥬스 당첨! 🧃" : "포도알 획득!"}</div>`;
    } else {
      html += `<button class="grape-btn" id="giveGrapeBtn">다 했어요! 엄마, 포도알 주세요</button>`;
    }
  }
  const bunches = Math.floor(count / 30);
  const cur = count % 30;
  if (count > 0 && cur === 0) {
    html += `<div class="grape-done">포도송이 완성! 🎉 새 포도송이를 시작해요</div>`;
  }
  if (bunches > 0) {
    html += `<div class="grape-count" style="margin-top:8px">완성한 포도송이 🍇 <b>${bunches}</b>송이</div>`;
  }
  html += `<div class="grape-count" style="margin-top:${bunches > 0 ? 2 : 10}px">이번 판 포도알 <b>${cur}</b>개 (30개 모으면 포도송이 완성)</div>`;
  // 이번 판에 해당하는 날짜들 (완성된 송이 30개 단위 제외)
  const curDates = Object.keys(grapes).sort().slice(bunches * 30);
  html += `<div class="grape-board">`;
  for (let i = 0; i < 30; i++) {
    html += i < cur
      ? `<div class="grape on">${GRAPE_IMGS[grapeVariant(curDates[i])]}</div>`
      : `<div class="grape"></div>`;
  }
  html += `</div>`;
  area.innerHTML = html;

  const giveBtn = document.getElementById("giveGrapeBtn");
  if (giveBtn) giveBtn.addEventListener("click", () => {
    store.write(`${currentKid}/grapes/${selectedDate}`, true);
  });
}

// 해당 날짜의 체크리스트 항목 (날짜마다 완전히 독립)
function itemsOf(kid, dateStr) {
  return (kid.items || {})[dateStr] || [];
}

function eventsOf(kidKey, dateStr) {
  const ev = data[kidKey].events || {};
  return ev[dateStr] || [];
}

// 메모 내용에 따라 항상 같은 파스텔 색이 배정됨
const EVT_COLORS = [
  { bg: "#E8DFF3", fg: "#5B4874" }, // 보라
  { bg: "#DEEAF5", fg: "#3D5A78" }, // 파랑
  { bg: "#E3EFE0", fg: "#47663F" }, // 초록
  { bg: "#F7E8D8", fg: "#7A5A33" }, // 주황
  { bg: "#F5DEE3", fg: "#7A4050" }, // 분홍
  { bg: "#EFEADB", fg: "#6E6233" }, // 노랑
];
function evtColor(text) {
  let h = 0;
  for (const ch of String(text)) h = (h * 31 + ch.codePointAt(0)) % 997;
  return EVT_COLORS[h % EVT_COLORS.length];
}

function renderSchedule() {
  const kid = data[currentKid];
  const sched = kid.schedule[selectedDate] || [];
  document.getElementById("schedCurDate").textContent = fmtDate(selectedDate);
  const ul = document.getElementById("schedList");
  ul.innerHTML = `<li class="head"><span class="s-time" style="color:#8B8680">시간</span><span class="s-label">해야 할 일</span></li>`;
  const rowCount = Math.max(10, sched.length + 1);
  for (let i = 0; i < rowCount; i++) {
    const item = sched[i];
    const li = document.createElement("li");
    li.dataset.time = item ? item.time : "";
    li.dataset.end = item && item.end ? item.end : "";
    li.innerHTML = `
      <span class="s-time">
        <input class="t-start" inputmode="numeric" maxlength="5" placeholder="시작시간" value="${escapeHtml(li.dataset.time)}">
        <input class="t-end" inputmode="numeric" maxlength="5" placeholder="종료시간" value="${escapeHtml(li.dataset.end)}">
      </span>
      <input class="s-text" maxlength="30" value="${item ? escapeHtml(item.text) : ""}">
      ${item && editingSched ? `<button class="del">✕</button>` : ""}`;
    const tStart = li.querySelector(".t-start"), tEnd = li.querySelector(".t-end");
    const syncTime = () => {
      const s = parseTimeStr(tStart.value);
      const e = parseTimeStr(tEnd.value);
      li.dataset.time = s;
      li.dataset.end = (s && e > s) ? e : "";
      saveScheduleFromRows();
    };
    [tStart, tEnd].forEach(inp => {
      inp.addEventListener("change", syncTime);
      inp.addEventListener("keydown", ev => { if (ev.key === "Enter") inp.blur(); });
    });
    const txt = li.querySelector(".s-text");
    txt.addEventListener("change", saveScheduleFromRows);
    txt.addEventListener("keydown", e => { if (e.key === "Enter") txt.blur(); });
    const del = li.querySelector(".del");
    if (del) del.addEventListener("click", () => {
      txt.value = ""; li.dataset.time = ""; li.dataset.end = "";
      saveScheduleFromRows();
    });
    ul.appendChild(li);
  }
  const sBtn = document.getElementById("editSchedBtn");
  sBtn.textContent = editingSched ? "완료" : "항목 편집";
  sBtn.classList.toggle("editing", editingSched);
  renderTimeline(sched, document.getElementById("schedTimeline"));
}

// "1830", "930", "18:30" 같은 입력을 "18:30" 형식으로 변환 (잘못된 값은 빈 문자열)
function parseTimeStr(s) {
  const d = String(s).replace(/[^0-9]/g, "");
  if (!d) return "";
  let h, m;
  if (d.length <= 2) { h = Number(d); m = 0; }
  else { h = Number(d.slice(0, d.length - 2)); m = Number(d.slice(-2)); }
  if (h > 23 || m > 59) return "";
  return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
}

function schedRows() {
  return document.querySelectorAll("#schedList li:not(.head)");
}

// 왼쪽 표의 모든 줄을 읽어 계획표로 저장
function saveScheduleFromRows() {
  const sched = [];
  for (const li of schedRows()) {
    const t = li.dataset.time;
    const e = li.dataset.end;
    const x = li.querySelector(".s-text").value.trim();
    if (!t && !x) continue;
    sched.push({ time: t, end: (e && e > t) ? e : "", text: x });
  }
  store.write(`${currentKid}/schedule/${selectedDate}`, sched.length ? sched : null);
}

function renderTimeline(schedule, tl) {
  tl.innerHTML = "";
  const items = schedule.filter(r => /^\d{1,2}:\d{2}$/.test(r.time))
    .slice().sort((a, b) => a.time.localeCompare(b.time));
  const toH = s => { const [h, m] = s.split(":").map(Number); return h + m / 60; };
  // 각 활동의 구간: 시작 ~ 끝 (끝이 없으면 1시간)
  const spans = items.map(r => {
    const s = toH(r.time);
    const e = (r.end && /^\d{1,2}:\d{2}$/.test(r.end) && toH(r.end) > s) ? toH(r.end) : Math.min(s + 1, 24);
    return { s, e, text: r.text };
  });
  // 기본 범위: 08시 ~ 24시 (더 이른 할 일이 있으면 그만큼 확장)
  const dayStart = Math.floor(Math.min(8, ...spans.map(sp => sp.s)));
  const dayEnd = 24;
  const PPH = 24; // 1시간당 픽셀 (세로)

  let html = `<div class="vt-head">타임라인</div>
    <div class="vt" style="height:${(dayEnd - dayStart) * PPH}px; border-radius:0 0 6px 6px"><div class="vt-divider"></div>`;
  for (let h = dayStart + 1; h < dayEnd; h++) {
    html += `<div class="vt-line" style="top:${(h - dayStart) * PPH}px"></div>`;
  }
  for (let h = dayStart; h < dayEnd; h++) {
    html += `<span class="vt-label" style="top:${(h - dayStart) * PPH + PPH / 2}px">${h}</span>`;
  }
  for (const sp of spans) {
    const c = evtColor(sp.text);
    html += `<div class="vt-bar" style="top:${(sp.s - dayStart) * PPH + 1}px; height:${(sp.e - sp.s) * PPH - 2}px; background:${c.bg}; border:1px solid ${c.fg}55; color:${c.fg}">${escapeHtml(sp.text)}</div>`;
  }
  html += `</div>`;
  tl.innerHTML = html;
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  const today = todayStr();
  const { y: year, m: month } = calCursor;
  document.getElementById("curMonth").textContent = `${year}년 ${month}월`;
  const legend = document.getElementById("calLegend");
  const kidInfo = KIDS[currentKid];
  if (kidInfo.vacStart && year === 2026 && (month === 7 || month === 8)) {
    const vs = parseDate(kidInfo.vacStart), ve = parseDate(shiftDate(kidInfo.schoolStart, -1));
    legend.innerHTML = `<span><i class="bar" style="height:10px"></i>${kidInfo.name} 방학 (${vs.getMonth()+1}/${vs.getDate()} ~ ${ve.getMonth()+1}/${ve.getDate()})</span>`;
    legend.style.display = "flex";
  } else {
    legend.style.display = "none";
  }

  const first = new Date(year, month-1, 1);
  const daysInMonth = new Date(year, month, 0).getDate();
  const startOffset = first.getDay();
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  let html = `<div class="cal-month"><div class="cal-grid">`;
  ["일","월","화","수","목","금","토"].forEach((d, i) => {
    html += `<div class="dow ${i === 0 ? "sun" : ""}">${d}</div>`;
  });
  for (let c = 0; c < totalCells; c++) {
    const d = new Date(year, month-1, c - startOffset + 1);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const inMonth = d.getMonth() === month - 1;
    const bars = (kidInfo.vacStart && ds >= kidInfo.vacStart && ds < kidInfo.schoolStart) ? `<div class="bar"></div>` : "";
    const evts = eventsOf(currentKid, ds);
    let chips = evts.slice(0, 2).map(e => {
      const c = evtColor(e.text);
      return `<div class="cal-evt" style="background:${c.bg}; color:${c.fg}">${escapeHtml(e.text)}</div>`;
    }).join("");
    if (evts.length > 2) chips += `<div class="cal-more">+${evts.length - 2}</div>`;
    const cls = ["cal-cell"];
    if (!inMonth) cls.push("dim");
    if (d.getDay() === 0) cls.push("sun");
    if (ds === today) cls.push("today");
    if (ds === selectedDate) cls.push("selected");
    html += `<div class="${cls.join(" ")}" data-date="${ds}"><span class="num">${d.getDate()}</span>${chips}<div class="cal-bars">${bars}</div></div>`;
  }
  html += `</div></div>`;
  cal.insertAdjacentHTML("beforeend", html);

  cal.querySelectorAll(".cal-cell[data-date]").forEach(cell => {
    cell.addEventListener("click", () => {
      selectedDate = cell.dataset.date;
      render();
    });
  });
}

function renderCalMemo() {
  const box = document.getElementById("calMemo");
  const list = eventsOf(currentKid, selectedDate);
  let html = `<div class="memo-title"><svg class="icon" style="width:13px;height:13px;vertical-align:-2px" viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg> ${fmtDate(selectedDate)} 메모</div>`;
  if (list.length) {
    html += `<ul class="evt-list">` + list.map((e, i) => {
      const c = evtColor(e.text);
      return `
      <li>${e.time ? `<span class="evt-time" style="color:${KIDS[currentKid].color}">${escapeHtml(e.time)}</span>` : ""}
        <span style="background:${c.bg}; color:${c.fg}; border-radius:6px; padding:2px 8px">${escapeHtml(e.text)}</span>
        <button class="del" data-i="${i}">✕</button></li>`;
    }).join("") + `</ul>`;
  }
  html += `<div class="add-row"><input id="calMemoText" placeholder="메모 입력 (예: 할머니 댁)" maxlength="40"><button id="calMemoAdd">추가</button></div>`;
  box.innerHTML = html;
  box.querySelectorAll(".del").forEach(btn => {
    btn.addEventListener("click", () => {
      const arr = list.filter((_, i) => i !== Number(btn.dataset.i));
      store.write(`${currentKid}/events/${selectedDate}`, arr.length ? arr : null);
    });
  });
  document.getElementById("calMemoAdd").addEventListener("click", () => {
    const input = document.getElementById("calMemoText");
    const text = input.value.trim();
    if (!text) return;
    store.write(`${currentKid}/events/${selectedDate}`, [...list, { time: "", text }]);
  });
  document.getElementById("calMemoText").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("calMemoAdd").click();
  });
}

function shiftMonth(n) {
  let m = calCursor.m + n, y = calCursor.y;
  if (m < 1) { m = 12; y--; }
  if (m > 12) { m = 1; y++; }
  calCursor = { y, m };
  renderCalendar();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

  const input = document.getElementById("commentText");

  if (!text) return;
  const who = document.getElementById("commentWho").value;
  const arr = (data[currentKid].comments || {})[selectedDate] || [];

document.getElementById("editPhoneBtn").addEventListener("click", () => { editingPhone = !editingPhone; render(); });

  input.value = "";
  store.write(`${currentKid}/items/${selectedDate}`, items);

document.getElementById("todayLabel").textContent = "오늘은 " + fmtDate(todayStr());
initStore();
